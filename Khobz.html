<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الصور | Pâtisserie Al Nojoum</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; text-align: center; }
        .gallery-title { color: #2d3436; margin-bottom: 30px; border-bottom: 3px solid #d35400; display: inline-block; padding-bottom: 10px; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .product-card:hover { transform: scale(1.03); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 15px; }
        .price { color: #e67e22; font-size: 1.3em; font-weight: bold; margin: 10px 0; }
        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 25px;
            background: #2d3436;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 class="gallery-title">قائمة المنتجات</h1>

    <div class="gallery-grid">
        <div class="product-card">
            <img src="smiya_dyal_tswira1.jpg" alt="منتج 1">
            <div class="info">
                <h3>سمية المنتج (مثلا: خبز الدار)</h3>
                <p class="price">2.00 درهم</p>
            </div>
        </div>

        <div class="product-card">
            <img src="smiya_dyal_tswira2.jpg" alt="منتج 2">
            <div class="info">
                <h3>سمية المنتج (مثلا: خبز السميدة)</h3>
                <p class="price">2.50 درهم</p>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-btn">← الرجوع للرئيسية</a>

</body>
</html>

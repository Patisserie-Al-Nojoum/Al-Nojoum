<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض البطبوط - مخبزة النجوم</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f2f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header-blue {
            background: linear-gradient(135deg, #2980b9, #3498db);
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #2980b9;
            font-weight: bold;
            border: 2px solid #2980b9;
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .back-link:hover { background: #2980b9; color: white; }

        /* Grid interactif d s-swar */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery-item {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        .gallery-item:hover {
            transform: scale(1.05); /* Tswira t-kber chwiya */
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }
        footer { margin-top: 50px; color: #7f8c8d; font-size: 0.9em; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← العودة للرئيسية</a>

    <div class="header-blue">
        <h1>معرض صور البطبوط</h1>
        <p>تشكيلة من أجود أنواع البطبوط الطري</p>
    </div>

    <div class="gallery">
        <div class="gallery-item"><img src="batbot_1.jpg" alt="بطبوط الدار"></div>
        <div class="gallery-item"><img src="batbot_2.jpg" alt="بطبوط الدار"></div>
        <div class="gallery-item"><img src="batbot_3.jpg" alt="بطبوط الدار"></div>
        <div class="gallery-item"><img src="batbot_4.jpg" alt="بطبوط الدار"></div>
        <div class="gallery-item"><img src="batbot_5.jpg" alt="بطبوط الدار"></div>
        <div class="gallery-item"><img src="batbot_6.jpg" alt="بطبوط الدار"></div>
        <div class="gallery-item"><img src="batbot_7.jpg" alt="بطبوط الدار"></div>
        <div class="gallery-item"><img src="batbot_8.jpg" alt="بطبوط الدار"></div>
    </div>

    <footer>© 2026 Pâtisserie Al Nojoum</footer>

</body>
</html>
